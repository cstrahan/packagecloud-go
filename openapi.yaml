  /install/repositories/{user_id}/{repo}/script.{type}.sh:
    get:
      operationId: install_script
      tags:
      - install
      summary: install script
      description: |-
        Return a self-contained bash setup script for the given package manager, served as `Content-Type: application/x-sh`. Pipe it to a shell — `sudo bash` for the OS package managers (they write to system paths), plain `bash` for the language ones — e.g.

        ```
        curl -s https://<master-token>:@packagecloud.io/install/repositories/{user_id}/{repo}/script.deb.sh | sudo bash
        ```

        By `type`:

        - `deb`: detect the OS, install prerequisites (curl, gpg, apt-transport-https, debian-archive-keyring), import the repo GPG key (via `gpg_key_url.list`), write `/etc/apt/sources.list.d/` from `config_file.list`, then `apt-get update`.
        - `rpm`: write a `.repo` from `config_file.repo` into `/etc/yum.repos.d/` (or `/etc/zypp/repos.d/` on SUSE) and refresh the cache.
        - `alpine`: import the repo's RSA signing key (via `rsa_key_url.alpine`) into `/etc/apk/keys`, then append the apk repository (from `config_file.alpine`) to `/etc/apk/repositories`.
        - `node`: mint a read token (via `tokens.text`) and write an `.npmrc` registry entry.
        - `gem`: mint a read token and `gem source --add` the repo.
        - `python`: mint a read token and add the repo to `~/.pip/pip.conf`.
        - `helm`: mint a read token and `helm repo add` (then `helm repo update`) with the token as the username.

        The `deb`, `rpm`, `alpine`, and `helm` scripts register the repository locally as `<user>_<repo>` — only the `/` separator becomes `_`; dashes and other characters in the repo name are preserved (e.g. `acme/my-repo` → `acme_my-repo`). That name is used for the apt `.list` file (and its `-archive-keyring.gpg`), the yum/zypper `.repo` file, the apk repository entry, and the `helm repo add` name respectively. The `node`, `gem`, and `python` scripts create no named entry — they configure the registry/source URL directly.

        Inputs are read from environment variables set before running (the script takes no arguments when piped):

        - `os`, `dist`: override the auto-detected distribution and version — honored by `deb`, `rpm`, and `alpine` (see the supported OS list at https://packagecloud.io/docs#os_distro_version).
        - `unique_id`: the read-token name to create/reuse — honored by `deb`, `rpm`, `node`, `python`, and `alpine`; defaults to the machine's hostname. (`gem` and `helm` always use the hostname.)
      security:
      - masterToken: []
      parameters:
      - name: user_id
        in: path
        required: true
        schema:
          type: string
        description: The username the repository belongs to.
      - name: repo
        in: path
        required: true
        schema:
          type: string
        description: The name of the repository.
      - name: type
        in: path
        required: true
        schema:
          type: string
        description: 'Package-manager type. Known values: `deb`, `rpm`, `alpine`, `node`, `gem`, `python`,
          `helm`.'
        example: deb
      responses:
        '200':
          description: A bash setup script.
          content:
            text/plain:
              schema:
                type: string
components:
  securitySchemes:
    apiToken:
      type: http
      scheme: basic
      description: 'HTTP basic auth: provide your API token as the username, leave the password empty.'
    emailPassword:
      type: http
      scheme: basic
      description: HTTP basic auth using your packagecloud account email as the username and password
        as the password. Used by the token-retrieval endpoint.
    masterToken:
      type: http
      scheme: basic
      description: HTTP basic auth using a repository master token value as the username (password empty).
        Used by the /install repository-setup endpoints. Retrieve the value from the master_tokens API;
        the install page uses the repository's `default` master token.
  parameters:
    pageParam:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
      description: One-based page index.
    perPageParam:
      name: per_page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
      description: Items per page (default 30). Values above the server's Max-Per-Page are clamped; inspect
        the Max-Per-Page response header for the effective cap.
  headers:
    LinkHeader:
      description: RFC-5988 pagination links for this response (rel="next", "prev", "last").
      schema:
        type: string
    TotalHeader:
      description: Total number of items in the underlying collection.
      schema:
        type: integer
    PerPageHeader:
      description: Number of items returned on this page.
      schema:
        type: integer
    MaxPerPageHeader:
      description: Maximum number of items the server will return on a single page.
      schema:
        type: integer
  schemas:
    CountValue:
      type: object
      properties:
        value:
          type: integer
          description: The value of the result
      example:
        value: 12312
    GPGKey:
      type: object
      properties:
        name:
          type: string
          description: The name of the GPG key.
        fingerprint:
          type: string
          description: The GPG key's fingerprint.
        keytype:
          type: string
          description: The GPG key type ('repo' for repository signing keys or 'package' for package signing
            keys).
        self:
          type: string
          description: The URL for this object.
        destroy_url:
          type: string
          description: The URL that can be used to delete this GPG key.
        download_url:
          type: string
          description: The URL that can be used to download the GPG public key data.
      example:
        name: user-repo-99A35B3F55E8EB3B.pub.gpg
        fingerprint: 99A35B3F55E8EB3B
        keytype: repo
        self: /api/v1/repos/user/repo/gpg_keys/user-repo-99A35B3F55E8EB3B.pub.gpg.json
        destroy_url: /api/v1/repos/user/repo/gpg_keys/user-repo-99A35B3F55E8EB3B.pub.gpg.json
        download_url: https://packagecloud.io/user/repo/gpgkey
    MasterToken:
      type: object
      properties:
        name:
          type: string
          description: The name of the master token.
        value:
          type: string
          description: The value of the master token, for use in the read token API.
        read_tokens:
          type: array
          items:
            type: object
            properties:
              value:
                type: string
              name:
                type: string
          description: An array of {ReadToken} objects that belong to this master token.
        paths:
          type: object
          properties:
            self:
              type: string
              description: A URI for this master token. Can be used to destroy one.
      example:
        value: e5480f5b38f1f78de2aaa0fa732d1427b1b83113371fd97d
        name: default
        read_tokens:
        - value: 3fe453060fd7f017219e308eb98ccf273b4c3655ba57577a
          name: app1.somewhere.com
        paths:
          self: /api/v1/repos/somewhere/production/master_tokens/1
    MasterTokenReadTokens:
      type: object
      properties:
        name:
          type: string
          description: The name of the master token.
        value:
          type: string
