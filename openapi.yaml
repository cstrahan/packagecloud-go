openapi: 3.1.0
info:
  title: packagecloud API
  version: 1.0.0
  description: |
    REST API for managing packagecloud repositories. Generated from https://packagecloud.io/docs/api.

    ## Consuming packages

    Once a read token is provisioned (via the `/install` endpoints or the read-tokens API), packages are served from per-repository URLs. This spec does not model those as operations — their sub-paths follow each package manager's own layout (e.g. a Maven repo's groupId/artifactId/version tree), not packagecloud's. Substitute `<user>`, `<repo>`, `<token>`, and the consuming system's `<os>`/`<dist>` (the `/install` endpoints describe how those are derived; file/registry names use `<user>_<repo>`, where only the `/` separator becomes `_`).

    **apt (deb).** Modern apt (>= 1.1) keeps the token out of the list file:
    - `/etc/apt/sources.list.d/<user>_<repo>.list`:
      `deb [signed-by=/etc/apt/keyrings/<user>_<repo>-archive-keyring.gpg] https://packagecloud.io/<user>/<repo>/<os>/ <dist> main` (plus a matching `deb-src` line)
    - `/etc/apt/auth.conf.d/<user>_<repo>.conf`:
      `machine packagecloud.io/<user>/<repo>/ login <token> password <ignored>`
    - GPG key: `https://packagecloud.io/<user>/<repo>/gpgkey`

      Legacy apt (< 1.1) instead embeds the token in the URL and drops `signed-by`:
      `deb https://<token>:@packagecloud.io/<user>/<repo>/<os>/ <dist> main`.

    **yum/dnf & zypper (rpm).** In the `.repo` file:
    `baseurl=https://<token>:@packagecloud.io/<user>/<repo>/<os>/<dist>/$basearch` (source RPMs at `.../<os>/<dist>/SRPMS`), `gpgkey=https://<token>:@packagecloud.io/<user>/<repo>/gpgkey`.

    **apk (alpine).** Append to `/etc/apk/repositories`: `https://<token>:@packagecloud.io/<user>/<repo>/alpine/<dist>/main`; RSA signing key for `/etc/apk/keys`: `https://<token>:@packagecloud.io/<user>/<repo>/rsakey`.

    **npm.** Registry `https://packagecloud.io/<user>/<repo>/npm/`, with `//packagecloud.io/<user>/<repo>/npm/:_authToken=<token>` in `.npmrc`.

    **pip (pypi).** `extra-index-url=https://<token>:@packagecloud.io/<user>/<repo>/pypi/simple` (use `index-url` to make it the only source).

    **RubyGems.** `https://<token>:@packagecloud.io/<user>/<repo>/` (e.g. via `gem source --add` or a Bundler `source`).

    **Maven / Gradle / Leiningen / SBT.** The token is path-embedded, since these tools handle userinfo-in-URL poorly: `https://packagecloud.io/priv/<token>/<user>/<repo>/maven2`.

    **Helm.** `helm repo add <user>_<repo> https://packagecloud.io/<user>/<repo>/helm --username <token> --password <any>`.
servers:
- url: https://packagecloud.io
security:
- apiToken: []
tags:
- name: distributions
- name: gpg_keys
- name: licenses
- name: master_tokens
- name: packages
- name: read_tokens
- name: repositories
- name: stats
- name: api_tokens
- name: install
paths:
  /api/v1/distributions:
    get:
      operationId: distributions_index
      tags:
      - distributions
      summary: index
      description: |-
        **Example request:**

        ```
        curl https://packagecloud.io/api/v1/distributions.json
        ```
      responses:
        '200':
          description: Hash<String, Distribution> The response will be a JSON hash with the keys "deb",
            "dsc", and "rpm" whose values will be an array of hashes describing each distribution. This
            distribution hash will have an key called "versions" whose value is an array of JSON hashes
            describing each version of a particular Linux distribution which supports the package type.
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: array
                  items:
                    $ref: '#/components/schemas/Distribution'
              example:
                deb:
                - display_name: Ubuntu
                  index_name: ubuntu
                  versions:
                  - id: 4
                    display_name: 5.10 Breezy Badger
                    index_name: breezy
                  - id: 5
                    display_name: 6.06 LTS Dapper Drake
                    index_name: dapper
                  - id: 6
                    display_name: 6.10 Edgy Eft
                    index_name: edgy
                - display_name: Debian
                  index_name: debian
                  versions:
                  - id: 22
                    display_name: 4.0 etch
                    index_name: etch
  /api/v1/repos/{user_id}/{repo}/gpg_keys.json:
    get:
      operationId: gpg_keys_index
      tags:
      - gpg_keys
      summary: index
      description: |-
        List gpg keys for a repository.

        **Example request:**

        ```
        curl https://packagecloud.io/api/v1/repos/username/reponame/gpg_keys.json
        ```
      parameters:
      - name: user_id
        in: path
        required: true
        schema:
          type: string
      - name: repo
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Array<GPGKey> An array of GPG key objects that belong to this repository.
          content:
            application/json:
              schema:
                type: object
                properties:
                  gpg_keys:
                    type: array
                    items:
                      $ref: '#/components/schemas/GPGKey'
                required:
                - gpg_keys
              example:
                gpg_keys:
                - self: /api/v1/repos/username/reponame/gpg_keys/username-reponame-85D7FBF915DFCBC6.pub.gpg.json
                  download_url: https://packagecloud.io/username/reponame/gpgkey/username-reopname-85D7FBF915DFCBC6.pub.gpg
                  keytype: repo
                  destroy_url: /api/v1/repos/username/reponame/gpg_keys/username-reponame-85D7FBF915DFCBC6.pub.gpg.json
                  fingerprint: 26F67F3E5E89BB30DCD7AC6E85D7FBF915DFCBC6
                  name: username-reponame-85D7FBF915DFCBC6.pub.gpg
    post:
      operationId: gpg_keys_create
      tags:
      - gpg_keys
      summary: create
      description: |-
        Create a GPG key.

        **Example request:**

        ```
        curl -X POST -F "gpg_key[keydata]=@/path/to/key.gpg" https://packagecloud.io/api/v1/repos/username/reponame/gpg_keys.json
        ```
      parameters:
      - name: user_id
        in: path
        required: true
        schema:
          type: string
        description: The username to which the repo belongs.
      - name: repo
        in: path
        required: true
        schema:
          type: string
        description: The name of the repo.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                gpg_key[keydata]:
                  type: string
                  format: binary
                  description: The GPG key file to use when creating a key.
      responses:
        '201':
          description: '[GPGKey](#object_GPGKey) The newly created GPG key object.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GPGKey'
              example:
                self: /api/v1/repos/username/reponame/gpg_keys/username-reopname-85D7FBF915DFCBC6.pub.gpg.json
                download_url: https://packagecloud.io/username/reponame/gpgkey/username-reopname-85D7FBF915DFCBC6.pub.gpg
                fingerprint: 26F67F3E5E89BB30DCD7AC6E85D7FBF915DFCBC6
                keytype: package
                name: username-reponame-85D7FBF915DFCBC6.pub.gpg
                destroy_url: /api/v1/repos/username/reponame/gpg_keys/username-reponame-85D7FBF915DFCBC6.pub.gpg.json
  /api/v1/repos/{user_id}/{repo}/gpg_keys/{keyname}.json:
    delete:
      operationId: gpg_keys_destroy
      tags:
      - gpg_keys
      summary: destroy
      description: |-
        Destroy a GPG key

        **Example request:**

        ```
        curl -X DELETE https://packagecloud.io/api/v1/repos/username/reponame/gpg_keys/username-reponame-85D7FBF915DFCBC6.pub.gpg.json
        ```
      parameters:
      - name: user_id
        in: path
        required: true
        schema:
          type: string
        description: The username to which the repo belongs.
      - name: repo
        in: path
        required: true
        schema:
          type: string
        description: The name of the repo.
      - name: keyname
        in: path
        required: true
        schema:
          type: string
        description: The GPG Key keyname to delete
      responses:
        '204':
          description: Successful response
    get:
      operationId: gpg_keys_show
      tags:
      - gpg_keys
      summary: show
      description: |-
        View a single GPG Key

        **Example request:**

        ```
        curl -X GET https://packagecloud.io/api/v1/repos/username/reponame/gpg_keys/username-reponame-85D7FBF915DFCBC6.pub.gpg.json
        ```
      parameters:
      - name: user_id
        in: path
        required: true
        schema:
          type: string
        description: The username to which the repo belongs.
      - name: repo
        in: path
        required: true
        schema:
          type: string
        description: The name of the repo.
      - name: keyname
        in: path
        required: true
        schema:
          type: string
        description: The GPG Key keyname.
      responses:
        '200':
          description: <GPGKey> The GPG Key object representing the requested key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GPGKey'
              example:
                self: /api/v1/repos/username/reponame/gpg_keys/username-reopname-85D7FBF915DFCBC6.pub.gpg.json
                download_url: https://packagecloud.io/username/reponame/gpgkey/username-reopname-85D7FBF915DFCBC6.pub.gpg
                fingerprint: 26F67F3E5E89BB30DCD7AC6E85D7FBF915DFCBC6
                keytype: package
                name: username-reponame-85D7FBF915DFCBC6.pub.gpg
                destroy_url: /api/v1/repos/username/reponame/gpg_keys/username-reponame-85D7FBF915DFCBC6.pub.gpg.json
  /api/v1/licenses/{license_key}/license.json:
    get:
      operationId: licenses_index
      tags:
      - licenses
      summary: index
      description: |-
        STILL IN USE BY GITLAB
        Retrieve a packagecloud:enterprise license file and GPG signature.
        Signature can be verified with the packagecloud GPG key:
        <https://packagecloud.io/gpg.key>.

        **Example request:**

        ```
        curl https://packagecloud.io/api/v1/licenses/aabbccddeeffaa/license.json
        ```
      parameters:
      - name: license_key
        in: path
        required: true
        schema:
          type: string
        description: The packagecloud:enterprise license key
      responses:
        '200':
          description: Hash JSON hash containing the license data and GPG signature
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/License'
  /api/v1/repos/{user_id}/{repo}/master_tokens:
    get:
      operationId: master_tokens_index
      tags:
      - master_tokens
      summary: index
      description: |-
        List master tokens for a repo.

        **Example request:**

        ```
        curl https://packagecloud.io/api/v1/repos/username/reponame/master_tokens
        ```
      parameters:
      - name: user_id
        in: path
        required: true
        schema:
          type: string
        description: The username to which the repo belongs.
      - name: repo
        in: path
        required: true
        schema:
          type: string
        description: The name of the repo.
      responses:
        '200':
          description: Array<MasterToken> An array of master token objects that belong to this repository.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MasterToken'
              example:
              - value: e5480f5b38f1f78de2aaa0fa732d1427b1b83113371fd97d
                name: default
                read_tokens:
                - value: 3fe453060fd7f017219e308eb98ccf273b4c3655ba57577a
                  name: app1.someservice.com
                paths:
                  self: /api/v1/repos/username/reponame/master_tokens/1
    post:
      operationId: master_tokens_create
      tags:
      - master_tokens
      summary: create
      description: |-
        Create a master token.

        **Example request:**

        ```
        curl -X POST -F "master_token[name]=app_servers" https://packagecloud.io/api/v1/repos/username/reponame/master_tokens
        ```
      parameters:
      - name: user_id
        in: path
        required: true
        schema:
          type: string
        description: The username to which the repo belongs.
      - name: repo
        in: path
        required: true
        schema:
          type: string
        description: The name of the repo.
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                master_token[name]:
                  type: string
                  description: The name of the token to create.
      responses:
        '201':
          description: '[MasterToken](#object_MasterToken) The newly created master token'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MasterToken'
              example:
                value: 1f3311f78de2aaa0fa732d1427b1b83113371fd97d
                name: app_servers
                paths:
                  self: /api/v1/repos/username/reponame/master_tokens/1
  /api/v1/repos/{user_id}/{repo}/master_tokens/search:
    get:
      operationId: master_tokens_search
      tags:
      - master_tokens
      summary: search
      description: |-
        Search for master tokens

        Default is 30 per page, see response headers for [pagination](#pagination) information.

        **Example request:**

        ```
        curl https://packagecloud.io/api/v1/repos/username/reponame/master_tokens/search?q=prod
        ```
      parameters:
      - name: user_id
        in: path
        required: true
        schema:
          type: string
        description: The username to which the repo belongs.
      - name: repo
        in: path
        required: true
        schema:
          type: string
        description: The name of the repo.
      - $ref: '#/components/parameters/pageParam'
      - $ref: '#/components/parameters/perPageParam'
      - name: q
        in: query
        required: false
        schema:
          type: string
        description: The name of the MasterToken.
      responses:
        '200':
          description: Array<MasterTokensResult> An array of {MasterTokensResult} objects for this search
            query.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MasterTokensResult'
          headers:
            Link:
              $ref: '#/components/headers/LinkHeader'
            Total:
              $ref: '#/components/headers/TotalHeader'
            Per-Page:
              $ref: '#/components/headers/PerPageHeader'
            Max-Per-Page:
              $ref: '#/components/headers/MaxPerPageHeader'
  /api/v1/repos/{user_id}/{repo}/master_tokens/{id}:
    get:
      operationId: master_tokens_show
      tags:
      - master_tokens
      summary: show
      description: |-
        Show a master token.

        **Example request:**

        ```
        curl https://packagecloud.io/api/v1/repos/username/reponame/master_tokens/1
        ```
      parameters:
      - name: user_id
        in: path
        required: true
        schema:
          type: string
        description: The username to which the repo belongs.
      - name: repo
        in: path
        required: true
        schema:
          type: string
        description: The name of the repo.
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: The id or value of the MasterToken.
      responses:
        '200':
          description: Array The name and value of the master token and API path for associated Read Tokens
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    value:
                      type: string
                    name:
                      type: string
                    read_tokens_url:
                      type: string
              example:
              - value: e5480f5b38f1f78de2aaa0fa732d1427b1b83113371fd97d
                name: default
                read_tokens_url: /api/v1/repos/username/reponame/master_tokens/1/read_tokens
    delete:
      operationId: master_tokens_destroy
      tags:
      - master_tokens
      summary: destroy
      description: |-
        Destroy a master token and all of its read token children.

        NOTE: Default tokens have their token value rotated when used with this
        API. All private repositories must have default master tokens.

        **Example request:**

        ```
        curl -X DELETE https://packagecloud.io/api/v1/repos/username/reponame/master_tokens/1
        ```
      parameters:
      - name: user_id
        in: path
        required: true
        schema:
          type: string
        description: The username to which the repo belongs.
      - name: repo
        in: path
        required: true
        schema:
          type: string
        description: The name of the repo.
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: The id of the master token to be destroyed.
      responses:
        '204':
          description: Successful response
  /api/v1/repos/{user_id}/{repo}/packages/contents.json:
    post:
      operationId: packages_contents
      tags:
      - packages
      summary: contents
      description: |-
        Inspect the contents of a debian source package.

        **Example request:**

        ```
        curl -X POST                                                  \
             -F "package[distro_version_id]=17"                       \
             -F "package[package_file]=@path/to/jake_1.0-7.dsc"             \
                "https://packagecloud.io/api/v1/repos/test_user/test_repo/packages/contents.json"
        ```
      parameters:
      - name: user_id
        in: path
        required: true
        schema:
          type: string
      - name: repo
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                package[distro_version_id]:
                  type: integer
                  description: The id of the DistroVersion to push this package to. Get this from the
                    distributions endpoint.
                package[package_file]:
                  type: string
                  format: binary
                  description: The `.dsc` file to inspect the contents of.
      responses:
        '200':
          description: PackageContents A JSON object with a `files` key containing an array of files referenced
            in this source package.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PackageContents'
              example:
                files:
                - filename: jake_1.0.orig.tar.bz2
                  size: 1108
                  md5sum: a7a309b55424198ee98abcb8092d7be0
                - filename: jake_1.0-7.debian.tar.gz
                  size: 1571
                  md5sum: 0fa5395e95ddf846b419e96575ce8044
  /api/v1/repos/{user_id}/{repo}/packages.json:
    post:
      operationId: packages_create
      tags:
      - packages
      summary: create
      description: |-
        Push a package.

        NOTE: that for Deban .dsc packages, you must upload each of the files contained in the .dsc.
        You can use the package\_contents API to determine the filename, md5sum, and size of the files referenced by the DSC.
        All other package types (debian, rpm, python, and java) need only specify the distro\_version\_id and package\_file parameters.

        **Example request:**

        ```
        curl -X POST https://packagecloud.io/api/v1/repos/test_user/test_repo/packages.json \
             -F "package[distro_version_id]=48"     \
             -F "package[package_file]=@path/to/jake-1.0-1.el6.x86_64.rpm"
        ```
      parameters:
      - name: user_id
        in: path
        required: true
        schema:
          type: string
      - name: repo
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                package[distro_version_id]:
                  type: integer
                  description: The id of the DistroVersion to push this package to. Get this from the
                    distributions endpoint. Not required for rubygems.
                package[package_file]:
                  type: string
                  format: binary
                  description: The package file.
                package[source_files][]:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: 'For debian source packages only: the source files that are specified in
                    the .dsc.'
                package[coordinates]:
                  type: string
                  description: 'For Maven/Java/Android packages only: the coordinates of this artifact
                    if they cannot be computed from metadata within the package.'
      responses:
        '201':
          description: '[PackageDetails](#object_PackageDetails) A JSON object representing the package.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PackageDetails'
              example:
                name: jake
                distro_version: fedora/22
                architecture: x86_64
                repository: test_repo
                size: '3712'
                summary: jake douglas is a very nice young man.
                filename: jake-1.0-1.el6.x86_64.rpm
                description: as it so happens, jake douglas is a very nice young man.
                dependencies:
                - context: requires
                  dependencies:
                  - libc.so.6(GLIBC_2.2.5)(64bit)
                  - rtld(GNU_HASH)
                md5sum: 5abe922fc4bbf5bbdac9b85173371892
                sha1sum: 062fd41ecf96587309ec9a3ae2035cc44c348b8f
                sha256sum: 070da5370a96ba3ae679e7d02d7de6309e4d159340d9f3b555d6d5b4b7cf260a
                sha512sum: 406fa288d5dfff194ec2b119b798c4658375a5d07b34f2d6350885cdf6b620f3fdeee45427fef8bcd37e6624049fba0c633b5b4030b79bf96028db6b4f01de87
                private: false
                uploader_name: test_user
                created_at: '2017-03-13T02:49:29.000Z'
                licenses:
                - GPL
                version: '1.0'
                release: 1.el6
                epoch: 0
                indexed: false
                repository_url: /api/v1/repos/test_user/test_repo
                repository_html_url: /test_user/test_repo
                package_url: /api/v1/repos/test_user/test_repo/package/rpm/fedora/22/jake/x86_64/1.0/1.el6.json
                versions_url: /api/v1/repos/test_user/test_repo/package/rpm/fedora/22/jake/x86_64/versions.json
                promote_url: /api/v1/repos/test_user/test_repo/fedora/22/jake-1.0-1.el6.x86_64.rpm/promote.json
                total_downloads_count: 0
                download_url: https://packagecloud.io/test_user/test_repo/packages/fedora/22/jake-1.0-1.el6.x86_64.rpm/download
                package_html_url: /test_user/test_repo/packages/fedora/22/jake-1.0-1.el6.x86_64.rpm
                downloads_detail_url: /api/v1/repos/test_user/test_repo/package/rpm/fedora/22/jake/x86_64/1.0/1.el6/stats/downloads/detail.json
                downloads_series_url: /api/v1/repos/test_user/test_repo/package/rpm/fedora/22/jake/x86_64/1.0/1.el6/stats/downloads/series/daily.json
                downloads_count_url: /api/v1/repos/test_user/test_repo/package/rpm/fedora/22/jake/x86_64/1.0/1.el6/stats/downloads/count.json
                destroy_url: /api/v1/repos/test_user/test_repo/fedora/22/jake-1.0-1.el6.x86_64.rpm
                self_url: /api/v1/repos/test_user/test_repo/package/rpm/fedora/22/jake/x86_64/1.0/1.el6.json
    get:
      operationId: packages_all
      tags:
      - packages
      summary: all
      description: |-
        List All Packages (not grouped by package version)

        **Example request:**

        ```
        curl "https://packagecloud.io/api/v1/repos/test_user/test_repo/packages.json"
        ```
      parameters:
      - name: user_id
        in: path
        required: true
        schema:
          type: string
        description: The user this repo belongs to.
      - name: repo
        in: path
        required: true
        schema:
          type: string
        description: The name of the repository.
      - $ref: '#/components/parameters/pageParam'
      - $ref: '#/components/parameters/perPageParam'
      responses:
        '200':
          description: '[PackageFragment](#object_PackageFragment) A JSON array of PackageFragment objects.'
          content:
            application/json:
              schema:
                type: array
                items:
